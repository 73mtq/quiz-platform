<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c05529">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>刷题平台 · 课程题库与随机练习</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Quiz Platform</p>
        <h1>课程题库与随机刷题</h1>
        <p>支持课程分组、文本导入、AI 图片识别、随机不重复刷题与错题追踪。</p>
      </div>
      <div class="metric">
        <strong id="questionCount">0</strong>
        <span>当前课程题数</span>
      </div>
    </header>

    <section class="toolbar">
      <select id="courseSelect"></select>
      <input id="courseName" placeholder="新课程名称">
      <button id="addCourseBtn">新增课程</button>
      <button id="deleteCourseBtn" class="ghost">删除课程</button>
    </section>

    <nav class="tabs">
      <button class="active" data-tab="importPanel">导入</button>
      <button data-tab="practicePanel">刷题</button>
      <button data-tab="reviewPanel">复习</button>
      <button data-tab="bankPanel">题库</button>
    </nav>

    <section id="importPanel" class="panel active">
      <h2>导入题目</h2>
      <textarea id="sourceText" placeholder="1. 题干&#10;A. 选项&#10;B. 选项&#10;答案：A&#10;解析：可选"></textarea>
      <div class="actions">
        <button id="sampleBtn">示例</button>
        <button id="importTextBtn">文本导入</button>
        <input id="imageInput" type="file" accept="image/*">
        <button id="aiBtn">AI 识别图片</button>
      </div>
      <p id="status" class="status"></p>
      <div id="importResult" class="import-result"></div>
    </section>

    <section id="practicePanel" class="panel">
      <div class="practice-head">
        <h2>随机刷题</h2>
        <button id="resetRoundBtn" class="ghost">重置本轮</button>
      </div>
      <div class="practice-mode-bar">
        <label class="practice-mode-label">刷题模式：</label>
        <label class="practice-mode-option">
          <input type="radio" name="practiceMode" value="all" checked> 全部题目
        </label>
        <label class="practice-mode-option">
          <input type="radio" name="practiceMode" value="count"> 指定数量
        </label>
        <label class="practice-mode-option">
          <input type="radio" name="practiceMode" value="wrong"> 错题重做
        </label>
        <input id="practiceCountInput" type="number" min="1" value="10" class="practice-count-input" style="display:none">
        <span id="practiceCountHint" class="practice-count-hint" style="display:none">题</span>
      </div>
      <p id="roundInfo"></p>
      <div id="accuracy" class="accuracy"></div>
      <div class="feedback-settings">
        <label><input id="showAnswerToggle" type="checkbox" checked> 答后显示正确答案</label>
        <label><input id="showExplanationToggle" type="checkbox" checked> 答后显示解析</label>
        <label><input id="autoNextToggle" type="checkbox"> 答对自动下一题</label>
        <label><input id="shuffleOptionsToggle" type="checkbox"> 选项乱序</label>
      </div>
      <article id="quizCard" class="quiz-card"></article>
      <div class="sticky-actions" id="stickyActions">
        <button id="submitBtn">提交答案</button>
        <button id="prevBtn" class="ghost" style="display:none">上一题</button>
        <button id="nextBtn">下一题</button>
      </div>
    </section>

    <section id="reviewPanel" class="panel">
      <div class="review-head">
        <h2>复习分析</h2>
        <div class="review-actions">
          <button data-review-action="practice-wrong">开始错题重做</button>
          <button class="ghost" data-review-action="open-wrong-bank">打开错题列表</button>
        </div>
      </div>
      <div id="reviewInsights" class="review-insights"></div>
    </section>

    <section id="bankPanel" class="panel">
      <h2>题库管理</h2>
      <div id="bankToolbar" class="bank-toolbar"></div>
      <div id="bankList" class="bank-list"></div>
    </section>
  </main>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
